<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PION</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;color:#0f0;font-family:'Courier New',monospace;font-size:13px}#bar{background:#111;border-bottom:1px solid #0f0;padding:6px 10px;display:flex;justify-content:space-between;align-items:center}#bar h1{font-size:14px;color:#0f0;margin:0}#bar .r{font-size:11px;color:#555}#out{padding:8px;height:calc(100vh - 100px);overflow-y:auto;white-space:pre-wrap;word-break:break-all}.i{color:#0f0}.e{color:#f44}.w{color:#ff0}.d{color:#888}#cmd-row{display:flex;border-top:1px solid #222;padding:4px}#cmd{flex:1;background:#111;border:1px solid #333;color:#0f0;font-family:monospace;font-size:13px;padding:6px;outline:none}#cmd:focus{border-color:#0f0}button{background:#111;border:1px solid #333;color:#0f0;font-family:monospace;padding:6px 10px;margin:0 2px;cursor:pointer;font-size:12px}button:hover{background:#0f0;color:#000}</style></head><body><div id='bar'><h1>PION π-1</h1><div class='r' id='st'></div></div><div id='out'></div><div id='cmd-row'><input id='cmd' placeholder='$ ...' autofocus><button onclick='run()'>&#9165;</button><button onclick='btn("battery")'>BAT</button><button onclick='btn("device")'>DEV</button><button onclick='btn("body")'>BODY</button><button onclick='btn("install")'>&#9660; &#960;-1</button></div><script>const out=document.getElementById('out');const cmd=document.getElementById('cmd');function p(t,c){const d=document.createElement('div');if(c)d.className=c;d.textContent=t;out.appendChild(d);out.scrollTop=out.scrollHeight}function cl(){out.innerHTML=''}async function api(path,opts){try{const r=await fetch('/api'+path,opts);return await r.text()}catch(e){return e.message}}async function run(){const c=cmd.value.trim();if(!c)return;p('$ '+c,'i');cmd.value='';const r=await api('/shell',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cmd:c})});p(r)}async function btn(a){if(a==='battery'){p('--- battery ---','w');p(await api('/device'),'d')}else if(a==='device'){p('--- device ---','w');p(await api('/device'),'d')}else if(a==='body'){p('--- hermes-body ---','w');p(await api('/body/screen/view'),'d')}else if(a==='install'){p('installing π-1...','w');p(await api('/install/pi'))}}cmd.addEventListener('keydown',e=>{if(e.key==='Enter')run()});p('PION v0.2','i');p('warunkowe środowisko · ekstremofil co sika do wulkanu','d');p('','')</script></body></html>
